<main class="max-w-[1200px] mx-auto px-4 py-6">

  <div class="text-center mb-10">
    <span class="inline-block bg-blue-100 text-primary-blue px-4 py-1 rounded-full text-s font-bold mb-4 uppercase tracking-widest">
      {{config?.noticePage?.header?.badge}}
    </span>
    <h2 class="text-3xl md:text-4xl font-black text-slate-900 mb-6">{{config?.noticePage?.header?.title}}</h2>
    <div class="h-1.5 w-40 brand-gradient-bg mx-auto rounded-full mb-8"></div>
    <p class="text-slate-600 max-w-2xl mx-auto text-lg">{{config?.noticePage?.header?.description}}</p>
  </div>
  <div class="space-y-6">
    <div *ngFor="let notice of config?.noticePage?.notices" class="notice-card flex flex-col md:flex-row gap-6 items-start">
      <div class="flex-shrink-0 brand-gradient-bg text-white px-4 py-3 rounded-lg text-center min-w-[100px] shadow-md">
        <p class="text-ms font-bold uppercase tracking-wider opacity-90">{{notice.month}}</p>
        <p class="text-3xl font-black">{{notice.day}}</p>
        <p class="text-ms font-bold">{{notice.year}}</p>
      </div>
      <div class="flex-grow">
        <div class="flex flex-wrap items-center gap-3 mb-2">
          <span class="text-[14px] font-bold px-2 py-0.5 rounded bg-blue-50 text-primary-blue border border-blue-100 uppercase">{{notice.category}}</span>
        </div>
        <h3 class="text-xl font-bold text-slate-900 mb-2">{{notice.title}}</h3>
        <p class="text-slate-600 mb-4 leading-relaxed">{{notice.description}}</p>
      </div>
    </div>
  </div>
  <div class="flex items-center justify-center pt-10">
    <button [routerLink]="config?.homepageRoute" class="flex items-center justify-center hover:scale-105 rounded-lg h-12 px-8 brand-gradient-bg text-white text-md font-bold hover:shadow-lg hover:opacity-90 transition-all" tabindex="0">
      {{config?.backButtonSection?.text}}
    </button>
  </div>
</main>
