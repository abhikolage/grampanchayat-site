<main class="max-w-[1400px] mx-auto px-4 py-6">
  <div class="text-center mb-8">
    <h2 class="text-3xl md:text-4xl font-black text-slate-900 mb-4">{{config?.galleryPage?.header?.title}}</h2>
    <div class="h-1.5 w-40 brand-gradient-bg mx-auto rounded-full mb-6"></div>
    <p class="text-slate-600 max-w-2xl mx-auto text-lg">{{config?.galleryPage?.header?.description}}</p>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <div *ngFor="let galleryItem of config?.galleryPage?.gallery" (click)="openImage(galleryItem.image)" class="gallery-item">
      <div class="aspect-[4/3] overflow-hidden rounded-t-lg">
        <img [alt]="galleryItem.title" class="w-full h-full object-cover" [src]="galleryItem.image" />
      </div>
      <div class="gallery-caption">
        {{galleryItem.title}}
      </div>
    </div>
  </div>


  <!-- Image Lightbox -->
  <div *ngIf="selectedImage"
       class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4"
       (click)="closeImage()">

    <div class="relative max-w-5xl w-full" (click)="$event.stopPropagation()">

      <!-- Close Button -->
      <button class="absolute -top-12 right-0 text-white text-3xl font-bold"
              (click)="closeImage()">
        ✕
      </button>

      <!-- Full Image -->
      <img [src]="selectedImage"
           class="w-full max-h-[85vh] object-contain rounded-xl shadow-2xl" />
    </div>
  </div>

  <div class="flex items-center justify-center pt-10">
    <button [routerLink]="config?.homepageRoute" class="flex items-center justify-center hover:scale-105 rounded-lg h-12 px-8 brand-gradient-bg text-white text-md font-bold hover:shadow-lg hover:opacity-90 transition-all" tabindex="0">
      {{config?.backButtonSection?.text}}
    </button>
  </div>
</main>
