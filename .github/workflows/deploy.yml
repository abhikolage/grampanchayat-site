name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install
        working-directory: grampanchayat-site-ui

      - name: Build Angular App
        run: npm run build -- --configuration production --base-href "/grampanchayat-site/"
        working-directory: grampanchayat-site-ui

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: grampanchayat-site-ui/dist/grampanchayat-site-ui/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
